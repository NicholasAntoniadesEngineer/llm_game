name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Ruff (extracted engine modules)
        run: ruff check orchestration/engine_terrain.py orchestration/engine_build_loop.py orchestration/engine_urbanista.py
      - name: Pytest
        run: pytest tests/ -q
